name: Keep node version and playwright version in sync

on:
  workflow_dispatch:
  push:
    branches:
      - "depfu/update/npm/playwright-core-**"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-node-version:
    name: Keep versions in sync
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit version sync updates back to the current branch.
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - name: Sync .node-version with the one that Playwright is using
        run: .github/bin/sync-node-version-from-playwright

      - name: Commit .node-version changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 Update .node-version after playwright update"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

      - name: Sync Playwright version in dockerfile with the one from package.json
        run: .github/bin/sync-playwright-version-to-dockerfile

      - name: Commit Dockerfile changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🤖 Update playwright-core in Dockerfile after depfu update"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
